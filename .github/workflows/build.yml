name: EAS Build & GitHub Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.26.1'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS preview)
        id: eas_build
        working-directory: artifacts/goal
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --output /tmp/eas-build.json \
            2>&1 | tee /tmp/eas-build.log
          
          # Parse JSON output file written by --output flag
          if [ -f /tmp/eas-build.json ]; then
            BUILD_URL=$(node -e "const d=JSON.parse(require('fs').readFileSync('/tmp/eas-build.json','utf8')); const b=Array.isArray(d)?d[0]:d; console.log(b?.artifacts?.buildUrl ?? b?.url ?? '')")
            BUILD_ID=$(node -e "const d=JSON.parse(require('fs').readFileSync('/tmp/eas-build.json','utf8')); const b=Array.isArray(d)?d[0]:d; console.log(b?.id ?? '')")
          else
            echo "No JSON output file, trying to parse stdout log..."
            # Fallback: find JSON in the build log
            BUILD_JSON=$(grep -o '\[{.*}\]' /tmp/eas-build.log | tail -1 || echo '[]')
            BUILD_URL=$(echo "$BUILD_JSON" | node -e "process.stdin.resume(); let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{try{const p=JSON.parse(d);console.log(p[0]?.artifacts?.buildUrl??'')}catch{console.log('')}})")
            BUILD_ID=$(echo "$BUILD_JSON" | node -e "process.stdin.resume(); let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{try{const p=JSON.parse(d);console.log(p[0]?.id??'')}catch{console.log('')}})")
          fi
          
          echo "Build URL: $BUILD_URL"
          echo "Build ID:  $BUILD_ID"
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID"   >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          APK_URL="${{ steps.eas_build.outputs.build_url }}"
          if [ -z "$APK_URL" ]; then
            echo "No build URL found, checking EAS dashboard..."
            exit 1
          fi
          curl -L "$APK_URL" -o goal-v${{ github.run_number }}.apk
          ls -lh goal-v${{ github.run_number }}.apk

      - name: Generate release notes
        id: release_notes
        run: |
          {
            echo "notes<<EOF"
            echo "## GOAL v${{ github.run_number }}"
            echo ""
            echo "### Changements"
            git log --oneline -10 --pretty=format:"- %s"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "GOAL v${{ github.run_number }}"
          body: ${{ steps.release_notes.outputs.notes }}
          files: goal-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
