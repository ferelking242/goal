kind = "mobile"
previewPath = "/"
title = "GOAL"
version = "1.0.0"
id = "artifacts/goal"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20871

[services.development]
run = "pnpm --filter @workspace/goal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/goal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/goal", "run", "serve" ]

[services.env]
PORT = "20871"
BASE_PATH = "/"
